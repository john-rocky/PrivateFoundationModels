name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Swift version
        run: swift --version

      - name: Resolve packages
        run: swift package resolve

      - name: Build (debug)
        run: swift build

      - name: Test
        run: swift test --parallel

      - name: Build (release)
        run: swift build -c release
